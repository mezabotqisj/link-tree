<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Crocs Link-Tree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #6a11cb;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .bio {
            color: #7f8c8d;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 0 15px;
        }
        
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .link-item {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            text-decoration: none;
            color: #333;
            border: 2px solid #f1f1f1;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .link-item:hover {
            transform: translateY(-5px);
            border-color: #6a11cb;
            box-shadow: 0 10px 20px rgba(106, 17, 203, 0.2);
        }

        .link-item.shopee:hover {
            border-color: #ee4d2d;
            box-shadow: 0 10px 20px rgba(238, 77, 45, 0.2);
        }
        
        .link-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 10px;
            margin-right: 15px;
            font-size: 20px;
            color: #6a11cb;
        }

        .link-item.shopee .link-icon {
            color: #ee4d2d;
        }
        
        .link-text {
            flex: 1;
            text-align: left;
        }
        
        .link-title {
            font-weight: 600;
            font-size: 16px;
            color: #2c3e50;
        }
        
        .link-description {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 3px;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .social-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 50%;
            color: #6a11cb;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .social-icon:hover {
            transform: translateY(-5px);
            background: #6a11cb;
            color: white;
        }
        
        .footer {
            color: black;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .visitor-counter {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            margin-top: 10px;
            display: inline-block;
        }
        
        /* Animasi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card, .link-item, .social-icon {
            animation: fadeIn 0.5s ease forwards;
        }
        
        .link-item:nth-child(1) { animation-delay: 0.1s; }
        .link-item:nth-child(2) { animation-delay: 0.2s; }
        .link-item:nth-child(3) { animation-delay: 0.3s; }
        .link-item:nth-child(4) { animation-delay: 0.4s; }
        .link-item:nth-child(5) { animation-delay: 0.5s; }
        
        /* Responsif */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 25px 20px;
            }
            
            .profile-img {
                width: 120px;
                height: 120px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .bio {
                font-size: 15px;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="3.png" class="profile-img" alt="Source Crocs Profile">
            <h1>Source Crocs Link-Tree</h1>
            <p class="bio">Source Crocs</p>
            
            <div class="links-container">
                <a href="https://instagram.com/source.crocs" class="link-item" target="_blank">
                    <div class="link-icon">
                        <i class="fab fa-instagram"></i>
                    </div>
                    <div class="link-text">
                        <div class="link-title">Instagram</div>
                        <div class="link-description">Akun Official Instagram</div>
                    </div>
                </a>
                
                <a href="https://wa.me/62859342072060" class="link-item" target="_blank">
                    <div class="link-icon">
                        <i class="fab fa-whatsapp"></i>
                    </div>
                    <div class="link-text">
                        <div class="link-title">WhatsApp</div>
                        <div class="link-description">Chat untuk pemesanan PRE-ORDER</div>
                    </div>
                </a>
                
                <a href="https://tiktok.com/@source.crocs" class="link-item" target="_blank">
                    <div class="link-icon">
                        <i class="fab fa-tiktok"></i>
                    </div>
                    <div class="link-text">
                        <div class="link-title">TikTok</div>
                        <div class="link-description">Akun Official Tiktok</div>
                    </div>
                </a>

                <a href="https://shopee.co.id/source.crocs" class="link-item shopee" target="_blank">
                    <div class="link-icon">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="link-text">
                        <div class="link-title">Shopee</div>
                        <div class="link-description">Akun Shopee</div>
                    </div>
                </a>
            </div>
        </div>
        
        <div class="visitor-counter">
            <i class="fas fa-eye"></i> <span id="visitorCount">1,248</span> pengunjung
        </div>
        
        <div class="footer">
            <p>© 2026 Source Crocs Link-Tree. Dibuat dengan <i class="fas fa-heart" style="color:#e74c3c;"></i></p>
            <p style="font-size: 12px; margin-top: 5px;">Halaman ini diperbarui terakhir: <span id="currentDate"></span></p>
        </div>
    </div>
    
    <script>
        // Menampilkan tanggal terkini
        const currentDateElement = document.getElementById('currentDate');
        const now = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        currentDateElement.textContent = now.toLocaleDateString('id-ID', options);
        
        // Simulasi penghitung pengunjung (akan bertambah setiap kali halaman dimuat)
        const visitorCountElement = document.getElementById('visitorCount');
        let currentCount = parseInt(visitorCountElement.textContent.replace(',', ''));
        
        // Tambah pengunjung acak antara 1-5 setiap kali halaman dimuat
        const randomIncrement = Math.floor(Math.random() * 5) + 1;
        currentCount += randomIncrement;
        
        // Format angka dengan pemisah ribuan
        visitorCountElement.textContent = currentCount.toLocaleString('id-ID');
        
        // Efek hover untuk link
        const linkItems = document.querySelectorAll('.link-item');
        linkItems.forEach(item => {
            item.addEventListener('mouseenter', function() {
                const icon = this.querySelector('.link-icon i');
                icon.style.transform = 'scale(1.2)';
            });
            
            item.addEventListener('mouseleave', function() {
                const icon = this.querySelector('.link-icon i');
                icon.style.transform = 'scale(1)';
            });
        });
        
        // Animasi loading sederhana
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s';
            
            setTimeout(function() {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
